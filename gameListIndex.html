var zipfile={};
// Ajax로 xml생성, 다운로드
// + 롬관련파일(이미지,동영상등) zip 파일로 묶어 다운로드
function xmlDownload(zip){
    zip = zip||0;
    console.log(`zip: ${zip}`)
    // 서버로 전송할 json data 생성
    var gameInfo = data.gameList.game[clickLstCnt];
    var jsonStrData = {};
    for(key in gameInfo){
        try{
            if(key=='scrap'){
                console.log(Array.isArray(gameInfo[key]), typeof gameInfo[key]);
                jsonStrData[key] = gameInfo[key];
            } else {
                jsonStrData[key] = Array.isArray(gameInfo[key])?gameInfo[key][0].decode():gameInfo[key].decode();
            }
        }catch(e){
            console.log(key, e)
        }
    }
    var body = JSON.stringify({game:jsonStrData}).encode();

    //호출 url 조립
    var idx = selSdImgs.options.selectedIndex;
    var sdImg = selSdImgs.options[idx].value.encode();
    var _url=`/genxml?sid=${system}&sd=${sdImg}&zip=${zip}`;
    Ajax({url:_url, body:body, type:"blob",
          content:(xhr)=>{
            console.log(xhr);
//        console.log(xhr.response);
            let disposition = xhr.getResponseHeader('Content-Disposition');
            if (disposition && disposition.indexOf('attachment') !== -1) { 
                let filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/; 
                let matches = filenameRegex.exec(disposition); 
                if (matches != null && matches[1]) filename = matches[1].replace(/['"]/g, ''); 
            } 
            let blob = new Blob([xhr.response]); 
            let link = document.createElement('a'); 
            link.href = window.URL.createObjectURL(blob); 
            link.download = decodeURI(filename); 
            link.click(); 
          },
          exception:(xhr,err)=>{
            console.log('EXCEPTION-xhr:',xhr);
            console.log('EXCEPTION-error:',err);
            let link = document.createElement('a'); 
//            link.href = '/xml/'+zipfile.down+'?download=1&basedir=1'; 
//            link.download = decodeURI(zipfile.name); 
            link.href = '/xml/'+zipfile.down+'?download=1&basedir=1&name='+zipfile.name; 
            link.click();
          }
    });
}
