    <script>
var data={};
function getJSON(evt){
    return evt.target.responseText.toJSON();
}
function putList(){
    if(!data.length) {
        bodyDiv.innerHTML = '결과없음';
        return;
    }
    var html = '<table border id="listTB">';
    // colgroup
    html += '<colgroup>';
    html += '<col align="right"></col>';
    for( var key in data[0] ){
        if(typeof data[0][key] === 'function') continue;
        html += (key=='size')?'<col align="right"></col>':'<col></col>';
    }
    html += '</colgroup>';
    // header
    html += '<tr>';
//    html += '<td></td>';
    html += '<th>No.</th>';
    for( var key in data[0] ){
        if(typeof data[0][key] === 'function') continue;
        html += `<th>${key}</th>`;
    }
    html += '</tr>';

    var aTmp = '<a href="/?sd=SDIMG&sid=SYSTEM&rom=./ROM">TITLE</a>';
    data.forEach((item, idx)=>{
        html += '<tr>';
        var anchor = aTmp.replace('SDIMG' , item.sdimage)
                         .replace('SYSTEM', item.system)
                         .replace('ROM'   , item.name)
        html += `<td align="center">${(idx+1)}</td>`;
        for( var key in item ){
            if(typeof item[key] === 'function') return;
            //html += `<td>${item[key]}</td>`;
            var val = (key=='size')?item[key].format():item[key];
            var content = anchor.replace('TITLE', val);
            var align=(key=='size')?' align="right"':'';
            html += `<td${align}>${content}</td>`;
        }
        html += '</tr>';
    });
    html+='</table>';
    bodyDiv.innerHTML = html;
}
function getList(){
    var url = '/filelist';
    if(searchID.value) {
        url += '?q='+encodeURIComponent(searchID.value)
            +  '&sd='+encodeURIComponent(sdimage.value)
            +  '&sid='+encodeURIComponent(system.value)
            +  '&ext='+encodeURIComponent(ext.value);
    }
    contentLoaddingImg.show();
    Ajax({
        url:url,
        onload:evt=>{
            contentLoaddingImg.hide();
            //console.log('evt:',evt);
            //console.log('evt.responseText:',evt.target.responseText);
            data = evt.target.responseText.toJSON();
            putList();
        },
    });
}
function getSelectItems(id){
    Ajax({
        url:'/filelistselect?id='+id,
        onload:evt=>{
            var data = getJSON(evt);
            var selObj = document.querySelector("#"+id);
            selObj.options.length=1;
            data.forEach(item=>{
                selObj.options.add(new Option(item[id],item[id]))
            })
        }
    });
}
function search_v1(obj){
    //console.log(obj.id)
    if(obj.id == 'searchID') return;
    //console.log(searchID.value);
    if(!searchID.value) return;
    getList();
}
function linkDivToggle(){
    linkDiv.style.display = linkDiv.style.display?'':'none';
}
window.addEventListener('load',()=>{
    contentLoaddingImg.hide();
    //getList();
    getSelectItems('sdimage');
    getSelectItems('system');
    getSelectItems('ext');
});
